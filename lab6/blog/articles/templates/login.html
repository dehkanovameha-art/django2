{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>

    <!-- подключаем CSS -->
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body>

<div class="content">
    <h1>Вход</h1>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Логин">
        <input type="password" name="password" placeholder="Пароль">

        <input type="submit" value="Войти">
    </form>

    <div class="errors">
        {{ error }}
    </div>
</div>

</body>
</html>
